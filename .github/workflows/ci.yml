# Lint/format gate — mirrors the local devenv git-hooks (tofu fmt, terragrunt
# hcl format, tflint) so a bad commit fails in CI, not at the next drift run.
# Format + lint only: no creds, no backend, no provider API calls, and no use
# of untrusted event inputs in run: steps.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Scan infrastructure
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          skip-dirs: '**/.terragrunt-cache'
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Notify security channel
        if: always() && github.event_name == 'push' && steps.trivy.outcome == 'failure'
        env:
          WEBHOOK: ${{ secrets.DISCORD_SECURITY_WEBHOOK }}
        run: |
          if [[ -z "$WEBHOOK" ]]; then
            echo "::notice::DISCORD_SECURITY_WEBHOOK not configured"
            exit 0
          fi
          jq -nc \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg ref "$GITHUB_REF_NAME" \
            --arg url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{allowed_mentions:{parse:[]},embeds:[{title:"INFRASTRUCTURE SECURITY SCAN FAILED",description:("**Repository:** `"+$repo+"`\n**Ref:** `"+$ref+"`\nReview required; findings withheld from Discord.\n[Open workflow]("+$url+")"),color:15548997}]}' \
            | curl -fsS -H "Content-Type: application/json" --data @- "$WEBHOOK"

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: "1.12.1"

      - name: Install terragrunt
        env:
          TERRAGRUNT_VERSION: "1.1.1"
          TERRAGRUNT_SHA256: "98b0400ba1ae27120adeeb98ba97e75eba0bab0b4cbd7b8bb148d4ed29e2f823"
        run: |
          curl -fsSL -o "$RUNNER_TEMP/terragrunt" \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
          echo "${TERRAGRUNT_SHA256}  ${RUNNER_TEMP}/terragrunt" | sha256sum --check
          sudo install "$RUNNER_TEMP/terragrunt" /usr/local/bin/terragrunt
          terragrunt --version

      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
        with:
          tflint_version: v0.64.0

      - name: Install contract-test runner
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Infrastructure SSOT contract
        run: bats tests/*.bats
        env:
          GOMODCACHE: ${{ runner.temp }}/go-mod

      - name: tofu fmt
        run: git ls-files -z '*.tf' '*.tfvars' | xargs -0 -r tofu fmt -check

      - name: terragrunt hcl format
        run: terragrunt hcl format --check --diff

      - name: tflint
        run: |
          git ls-files '*.tf' \
            | xargs -n1 dirname \
            | sort -u \
            | xargs -n1 tflint --chdir
